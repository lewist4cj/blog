name: blog-server-aot

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1

      - name: Install .NET SDK 10.0
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin \
            --channel 10.0 \
            --install-dir "$HOME/.dotnet"
          export PATH="$HOME/.dotnet:$PATH"
          echo "dotnet version: $(dotnet --version)"

      - name: Install AOT prerequisites
        run: |
          sudo yum install -y clang zlib-devel
          clang --version

      - name: Publish Native AOT
        run: |
          export PATH="$HOME/.dotnet:$PATH"
          dotnet restore
          dotnet publish Blog.Api/Blog.Api.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained \
            -o ./publish
          ls -lh ./publish/
          file ./publish/Blog.Api

      - name: Upload artifact
        uses: upload-artifact@v0.0.1
        with:
          name: blog-server-aot-linux-x64
          path: ./publish/
