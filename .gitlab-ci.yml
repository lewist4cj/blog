stages:
  - build
  - deploy

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_SDK_VERSION: "10.0.301"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - ~/.nuget/packages/

aot-publish:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  only:
    - main
  script:
    # 安装 Native AOT 编译依赖
    - apt-get update && apt-get install -y --no-install-recommends clang zlib1g-dev
    - clang --version

    # 还原依赖
    - dotnet restore

    # 发布 Native AOT（linux-x64）
    - dotnet publish Blog.Api/Blog.Api.csproj
      -c Release
      -r linux-x64
      --self-contained
      -o ./publish

    # 验证产物
    - ls -lh ./publish/
    - file ./publish/Blog.Api

  artifacts:
    name: "blog-server-aot-linux-x64-$CI_COMMIT_SHORT_SHA"
    paths:
      - ./publish/
    expire_in: 30 days

  # 可选：部署到服务器
  # environment:
  #   name: production
  #   url: https://your-server.com
