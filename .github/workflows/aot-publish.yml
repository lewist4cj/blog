name: AOT Publish (Linux)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_SDK_VERSION: "10.0.301"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install .NET SDK ${{ env.DOTNET_SDK_VERSION }}
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin \
            --channel 10.0 \
            --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Verify SDK
        run: dotnet --version

      - name: Install NativeAOT prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            zlib1g-dev
          clang --version

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Native AOT (linux-x64)
        run: |
          dotnet publish Blog.Api/Blog.Api.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained \
            -o ./publish

      - name: Check output
        run: |
          ls -lh ./publish/
          file ./publish/Blog.Api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-server-aot-linux-x64
          path: ./publish/
          if-no-files-found: error
