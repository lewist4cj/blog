name: AOT Publish (Linux)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install NativeAOT prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            zlib1g-dev
          # 验证 clang 可用
          clang --version

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Native AOT (linux-x64)
        run: |
          dotnet publish Blog.Api/Blog.Api.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained \
            -o ./publish

      - name: Check output
        run: |
          ls -lh ./publish/
          file ./publish/Blog.Api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-server-aot-linux-x64
          path: ./publish/
          if-no-files-found: error
